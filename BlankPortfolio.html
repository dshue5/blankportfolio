<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Derek Shue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fff;
      color: #1a1a1a;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: clamp(48px, 8vw, 96px) clamp(32px, 7vw, 112px);
    }

    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .name {
      font-size: clamp(48px, 8vw, 100px);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 0.95;
      opacity: 0;
      transform: translateY(18px);
      animation: rise 1s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }

    .sub {
      font-size: clamp(18px, 2vw, 26px);
      font-style: normal;
      color: #999;
      margin-top: clamp(12px, 1.5vw, 20px);
      opacity: 0;
      transform: translateY(10px);
      animation: rise 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    }

    .rule {
      width: 100%;
      height: 1px;
      background: #e0e0e0;
      margin: clamp(40px, 6vw, 72px) 0;
      opacity: 0;
      animation: fadein 0.8s ease 0.55s forwards;
    }

    .experiments {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: clamp(4px, 0.8vw, 8px);
    }

    .experiments li {
      opacity: 0;
      transform: translateY(10px);
    }

    .experiments li:nth-child(1) { animation: rise 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.75s forwards; }
    .experiments li:nth-child(2) { animation: rise 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.88s forwards; }

    .experiments a {
      font-size: clamp(18px, 2vw, 26px);
      font-weight: 300;
      font-style: normal;
      color: #999;
      text-decoration: none;
      letter-spacing: 0;
      line-height: 1.4;
      display: inline-block;
      position: relative;
      transition: color 0.2s ease;
    }

    .experiments a::after {
      content: '';
      position: absolute;
      bottom: 1px;
      left: 0;
      width: 0;
      height: 1px;
      background: #999;
      transition: width 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .experiments a:hover::after { width: 100%; }

    footer {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #e0e0e0;
      opacity: 0;
      animation: fadein 1s ease 1s forwards;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadein {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="page">
    <main>
      <h1 class="name">Derek Shue</h1>
      <p class="sub">New York, NY</p>

      <div class="rule"></div>

      <p class="sub" style="margin-bottom: clamp(8px, 1vw, 14px); opacity: 0; animation: rise 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards; color: #1a1a1a; font-size: clamp(22px, 2.5vw, 32px);">Experiments:</p>
      <ul class="experiments">
        <li><a href="https://alchemist.dshue.com">Brand Alchemist</a></li>
        <li><a href="https://index.dshue.com">Aesthetic Index</a></li>
      </ul>
    </main>

    <footer>© 2026</footer>
  </div>
</body>
</html>
